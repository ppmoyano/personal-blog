backend:
  name: github
  repo: ppmoyano/personal-blog # Replace with your GitHub repo
  branch: main # Branch to update (optional; defaults to master)
  # IMPORTANT: This prevents Decap CMS from using Netlify's auth endpoint.
  # Replace this URL with your deployed OAuth Provider's URL.
  base_url: https://my-blog-oauth.vercel.app/

# Enable local testing (bypasses GitHub auth and writes to local files)
local_backend: true

# Since Vercel doesn't allow local uploads, and user requested external image URLs only
media_folder: "public/img" # Dummy path
public_folder: "/img" # Dummy path

collections:
  - name: "posts"
    label: "Posts"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - label: "Section"
        name: "section"
        widget: "select"
        options: 
          - {label: "Música", value: "music"}
          - {label: "IT", value: "programming"}
          - {label: "Espiritualidad", value: "spirituality"}
          - {label: "Familia", value: "family"}
          - {label: "Vida", value: "life"}
        required: true
      - label: "Subsection"
        name: "subsection"
        widget: "select"
        options: 
          - {label: "Ninguno", value: ""}
          - {label: "Canciones", value: "songs"}
          - {label: "Batería", value: "drums"}
          - {label: "Bandas", value: "bands"}
          - {label: "Anécdotas", value: "anecdotes"}
          - {label: "Viajes", value: "travel"}
          - {label: "Vida", value: "life"}
        required: false
      - {label: "Featured Image URL", name: "featured_image", widget: "string", required: false, hint: "Paste an external image URL"}
      - {label: "Excerpt", name: "excerpt", widget: "text", required: false, hint: "Short summary for the homepage"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Draft", name: "draft", widget: "boolean", default: false, required: false}
